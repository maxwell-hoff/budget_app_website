<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with rounded corners matching app window aesthetic -->
  <rect width="32" height="32" rx="7" fill="#111827"/>

  <!-- Origin node — the decision point -->
  <circle cx="7" cy="16" r="3" fill="#ffffff"/>

  <!-- Spent path — goes up and right, muted -->
  <path d="M7 16 C12 16 14 8 21 8"
        stroke="#6b7280" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="21" cy="8" r="2.5" fill="#6b7280"/>

  <!-- Future path — goes down and right, accent -->
  <path d="M7 16 C13 16 18 23 26 23"
        stroke="#f97316" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="26" cy="23" r="3" fill="#f97316"/>
</svg>
